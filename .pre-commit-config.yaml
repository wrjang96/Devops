default_install_hook_types:
  - pre-commit
  - pre-push

default_stages:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args:
          - --maxkb=1024
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        stages:
          - pre-commit
          - pre-push
        args:
          - --no-banner
          - --redact=100

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.45.0
    hooks:
      - id: markdownlint
        files: ^iac/local_k8s_prac/.*\.md$

  - repo: local
    hooks:
      - id: detect-korean-rrn
        name: Detect possible Korean resident registration numbers
        language: pygrep
        entry: '(?<!\d)\d{2}(?:0[1-9]|1[0-2])(?:0[1-9]|[12]\d|3[01])-[1-4]\d{6}(?!\d)'
        types_or:
          - text
        stages:
          - pre-commit
      - id: detect-korean-phone
        name: Detect possible Korean mobile phone numbers
        language: pygrep
        entry: '(?<!\d)01[016789]-?\d{3,4}-?\d{4}(?!\d)'
        types_or:
          - text
        stages:
          - pre-commit
